name: Tests

on:
  push:
    paths:
      - ".github/workflows/tests.yml"
      - "amadeus/**"
      - "cogs/**"
      - "main.py"
      - "pytest.ini"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "tests/**"
  pull_request:
    paths:
      - ".github/workflows/tests.yml"
      - "amadeus/**"
      - "cogs/**"
      - "main.py"
      - "pytest.ini"
      - "requirements.txt"
      - "requirements-dev.txt"
      - "tests/**"

jobs:
  unit-tests:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest
