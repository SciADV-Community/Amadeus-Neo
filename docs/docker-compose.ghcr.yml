services:
  amadeus:
    image: ghcr.io/sciadv-community/amadeus-neo:latest
    container_name: amadeus-neo
    init: true
    stop_grace_period: 30s
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=64m

    environment:
      DISCORD_TOKEN: "replace-me"
      AMADEUS_OWNER_ID: ""
      AMADEUS_COGS: "cogs.bouncer,cogs.honeypot,cogs.boost,cogs.activity"
      AMADEUS_DB_PATH: "/app/data/amadeus.sqlite3"
      AMADEUS_PRIVACY_POLICY_URL: ""
      AMADEUS_TERMS_OF_SERVICE_URL: ""
      AMADEUS_MIN_ACCOUNT_AGE_DAYS: "14"
      AMADEUS_MAX_FAILED_ATTEMPTS: "3"
      AMADEUS_CAPTCHA_LENGTH: "6"
      AMADEUS_CAPTCHA_EXPIRY_MINUTES: "10"
      AMADEUS_BACKFILL_DELAY_SECONDS: "1.5"
      AMADEUS_VERIFICATION_ROLE_DELAY_SECONDS: "5"
      AMADEUS_BACKFILL_INCLUDE_BOTS_BY_DEFAULT: "false"
      AMADEUS_LOG_LEVEL: "INFO"
      AMADEUS_DISCORD_LOG_LEVEL: "WARNING"
      AMADEUS_DEBUG: "false"
      AMADEUS_DEBUG_SERVER_ID: ""

    volumes:
      - type: bind
        source: /srv/amadeus-neo/data
        target: /app/data
        read_only: false

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    restart: unless-stopped
